services:
  - type: web
    name: bookly-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: bookly-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false        # You'll fill this in after Vercel deploy
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        value: "Bookly <noreply@bookly.app>"

databases:
  - name: bookly-db
    databaseName: bookly
    user: bookly
    plan: free
