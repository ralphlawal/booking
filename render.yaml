services:
  - type: web
    name: bookly-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: bookly-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false        # You'll fill this in after Vercel deploy
      - key: ADMIN_SUPPORT_PASSWORD
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: "BookAm <noreply@bookam.business>"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false

databases:
  - name: bookly-db
    databaseName: bookly
    user: bookly
    plan: free
